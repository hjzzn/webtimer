<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>全网排期监控中心</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 30px; background-color: #f4f6f9; color: #333;}
        .nav-bar { max-width: 1000px; margin: 0 auto 20px auto; display: flex; gap: 10px; background: #343a40; padding: 10px; border-radius: 6px; }
        .nav-bar a { color: #adbcda; text-decoration: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; font-size: 15px;}
        .nav-bar a.active { background-color: #007bff; color: white; }
        .nav-bar a:hover:not(.active) { color: white; background: #495057; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h2 { margin-top: 0; color: #222; font-size: 20px; border-left: 4px solid #007bff; padding-left: 10px; margin-bottom: 20px;}
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 11px; text-align: left; font-size: 14px; }
        th { background-color: #f8f9fa; font-weight: bold; }
        .code-style { font-family: Consolas, monospace; background: #f1f1f1; padding: 2px 5px; border-radius: 4px; font-size: 13px; color: #c7254e;}
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="/">🛠️ 智能设备集成中心 (首页)</a>
        <a href="/query" class="active">🔍 全网定时排期总览</a>
    </div>

    <div class="container">
        <div class="card">
            <h2>🔍 现役全网定时器监控大盘</h2>
            <table>
                <thead>
                    <tr>
                        <th>挂载目标设备</th>
                        <th>任务名称</th>
                        <th>周期类型</th>
                        <th>具体时间配置</th>
                        <th>运行状态</th>
                    </tr>
                </thead>
                <tbody id="globalTaskBody"></tbody>
            </table>
        </div>
    </div>

<script>
    async function loadGlobalTasks() {
        const response = await fetch('/api/tasks');
        const tasks = await response.json();
        const tbody = document.getElementById('globalTaskBody');
        tbody.innerHTML = '';
        const typeMap = { 'once': '单次', 'minute': '按分钟', 'hour': '按小时', 'daily': '每天', 'weekly': '每周', 'monthly': '每月', 'yearly': '每年' };

        if(tasks.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#888;">💡 全网目前无任何定时排期任务</td></tr>';
            return;
        }

        tasks.forEach(t => {
            tbody.innerHTML += `
                <tr>
                    <td><b style="color:#007bff;">${t.device_name}</b></td>
                    <td><strong>${t.name}</strong></td>
                    <td>${typeMap[t.task_type]}</td>
                    <td><span class="code-style">${t.time_value}</span></td>
                    <td>${t.is_active ? '🟢 监控中' : '🔴 已挂起'}</td>
                </tr>`;
        });
    }
    window.onload = loadGlobalTasks;
</script>
</body>
</html>
